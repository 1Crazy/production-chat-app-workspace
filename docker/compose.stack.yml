name: production-chat-stack

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chat_prod}
      POSTGRES_USER: ${POSTGRES_USER:-chat_prod}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chat_prod}
    volumes:
      - postgres_stack_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-chat_prod} -d ${POSTGRES_DB:-chat_prod}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_stack_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: quay.io/minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_stack_data:/data

  minio-init:
    image: quay.io/minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin}; do
          sleep 1
        done
        mc mb --ignore-existing local/${S3_BUCKET:-chat-production}
    restart: "no"

  migrate:
    build:
      context: ..
      dockerfile: server/Dockerfile
      target: tools
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-chat_prod}:${POSTGRES_PASSWORD:-chat_prod}@postgres:5432/${POSTGRES_DB:-chat_prod}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ..
      dockerfile: server/Dockerfile
      target: runtime
    restart: unless-stopped
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      APP_NAME: ${APP_NAME:-production-chat-api}
      DATABASE_URL: postgres://${POSTGRES_USER:-chat_prod}:${POSTGRES_PASSWORD:-chat_prod}@postgres:5432/${POSTGRES_DB:-chat_prod}
      REDIS_URL: redis://redis:6379/0
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-replace-with-production-access-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-replace-with-production-refresh-secret}
      AUTH_CODE_DELIVERY_MODE: webhook
      AUTH_DEBUG_CODE_ENABLED: "false"
      AUTH_CODE_WEBHOOK_URL: ${AUTH_CODE_WEBHOOK_URL}
      AUTH_CODE_WEBHOOK_SECRET: ${AUTH_CODE_WEBHOOK_SECRET:-}
      AUTH_CODE_EMAIL_FROM: ${AUTH_CODE_EMAIL_FROM}
      AUTH_CODE_EMAIL_NICKNAME: ${AUTH_CODE_EMAIL_NICKNAME}
      AUTH_CODE_EMAIL_HANDLE: ${AUTH_CODE_EMAIL_HANDLE}
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-chat-production}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

volumes:
  postgres_stack_data:
  redis_stack_data:
  minio_stack_data:
